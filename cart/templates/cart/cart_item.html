<div class="cart-item">
  <div class="cart-item__media">
    {% if item.product.main_image %}
      <img src="{{ item.product.main_image.url }}" alt="{{ item.product.name }}">
    {% else %}
      <div class="cart-item__noimage">No image</div>
    {% endif %}
  </div>

  <div class="cart-item__content">
    <div class="cart-item__top">
      <div>
        <h4 class="cart-item__title">{{ item.product.flavor }}</h4>
        <p class="cart-item__meta">
          {{ item.product.price }} CZK / шт
        </p>
      </div>

      <button
        class="cart-item__remove"
        hx-post="{% url 'cart:remove_item' item.id %}"
        hx-target="#modal-root"
        hx-swap="innerHTML"
        type="button">
        Видалити
      </button>
    </div>

    <div class="cart-item__bottom">
      <div class="cart-qty">
        <button
          class="cart-qty__btn"
          hx-post="{% url 'cart:update_item' item.id %}"
          hx-vals='{"quantity": {{ item.quantity|add:"-1" }} }'
          hx-target="#modal-root"
          hx-swap="innerHTML"
          type="button">
          −
        </button>

        <span class="cart-qty__value">{{ item.quantity }}</span>

        <button
          class="cart-qty__btn"
          hx-post="{% url 'cart:update_item' item.id %}"
          hx-vals='{"quantity": {{ item.quantity|add:"1" }} }'
          hx-target="#modal-root"
          hx-swap="innerHTML"
          type="button">
          +
        </button>
      </div>

      <div class="cart-item__sum">
        {{ item.total_price }} CZK
      </div>
    </div>
  </div>
</div>

<style>
  .cart-item{
    display: grid;
    grid-template-columns: 112px 1fr;
    gap: 14px;
    padding: 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: #fff;
    box-shadow: 0 1px 0 rgba(15,23,42,.02);
  }

  .cart-item__media{
    aspect-ratio: 1 / 1;
    border-radius: 16px;
    background: linear-gradient(180deg, #ffffff 0%, #fafafa 100%);
    border: 1px solid var(--border);
    display: grid;
    place-items: center;
    overflow: hidden;
  }

  .cart-item__media img{
    width: 100%;
    height: 100%;
    object-fit: contain;
    padding: 10px;
    filter: drop-shadow(0 10px 18px rgba(0,0,0,.10));
  }

  .cart-item__noimage{
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
  }

  .cart-item__content{
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 14px;
  }

  .cart-item__top{
    display: flex;
    justify-content: space-between;
    gap: 14px;
  }

  .cart-item__title{
    margin: 0;
    font-size: 17px;
    font-weight: 900;
    letter-spacing: -0.01em;
  }

  .cart-item__meta{
    margin: 6px 0 0;
    color: var(--muted);
    font-size: 13px;
  }

  .cart-item__remove{
    border: 0;
    background: transparent;
    color: #dc2626;
    font-weight: 800;
    cursor: pointer;
    padding: 0;
    white-space: nowrap;
  }

  .cart-item__bottom{
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 14px;
  }

  .cart-qty{
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 6px;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: #f8fafc;
  }

  .cart-qty__btn{
    width: 34px;
    height: 34px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: #fff;
    cursor: pointer;
    font-size: 18px;
    font-weight: 900;
  }

  .cart-qty__value{
    min-width: 24px;
    text-align: center;
    font-weight: 800;
  }

  .cart-item__sum{
    font-size: 18px;
    font-weight: 900;
    white-space: nowrap;
  }

  @media (max-width: 640px){
    .cart-item{
      grid-template-columns: 88px 1fr;
    }

    .cart-item__top,
    .cart-item__bottom{
      flex-direction: column;
      align-items: flex-start;
    }

    .cart-item__sum{
      font-size: 16px;
    }
  }
</style>
